services:
  minio:
    image: minio/minio:latest
    container_name: events-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:latest
    container_name: events-minio-init
    depends_on:
      minio:
        condition: service_started
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY}; do echo 'Esperando MinIO...' && sleep 2; done &&
      mc mb -p local/$${S3_BUCKET} || true &&
      mc anonymous set private local/$${S3_BUCKET} || true
      "

  db:
    image: postgres:16
    container_name: events-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: python:3.12-slim
    container_name: events-api
    restart: unless-stopped
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      API_SECRET_KEY: ${API_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      S3_USE_SSL: ${S3_USE_SSL}
      S3_URL_TTL_SECONDS: ${S3_URL_TTL_SECONDS}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./app/api:/app
    command: >
      sh -c "
      if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi &&
      if [ -f alembic.ini ]; then alembic upgrade head; fi &&
      if [ -f main.py ]; then uvicorn main:app --host 0.0.0.0 --port 8000 --reload; else
      echo 'No app/api/main.py yet. Waiting...' && tail -f /dev/null; fi
      "
    ports:
      - "8000:8000"

  web:
    image: node:20-alpine
    container_name: events-web
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./app/web:/app
    command: >
      sh -c "
      if [ -f package.json ]; then npm install && npm run dev -- --host 0.0.0.0 --port 5173; else
      echo 'No app/web/package.json yet. Waiting...' && tail -f /dev/null; fi
      "
    ports:
      - "5173:5173"

  # svc:
  #   image: python:3.12-slim
  #   container_name: events-svc
  #   restart: unless-stopped
  #   working_dir: /app
