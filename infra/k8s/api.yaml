apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tfm-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: api
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: 296368270177.dkr.ecr.eu-south-2.amazonaws.com/zt/api:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tfm-app-secret
                  key: DATABASE_URL_API
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: tfm-app-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: tfm-app-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: tfm-app-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: tfm-app-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tfm-app-secret
                  key: POSTGRES_PASSWORD
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tfm-app-secret
                  key: API_SECRET_KEY
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: tfm-app-config
                  key: S3_BUCKET
            - name: S3_REGION
              valueFrom:
                configMapKeyRef:
                  name: tfm-app-config
                  key: S3_REGION
            - name: S3_USE_SSL
              valueFrom:
                configMapKeyRef:
                  name: tfm-app-config
                  key: S3_USE_SSL
            - name: S3_URL_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: tfm-app-config
                  key: S3_URL_TTL_SECONDS
            - name: PYTHONUNBUFFERED
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: tfm-app
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
