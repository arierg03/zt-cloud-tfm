apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: tfm-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alb-to-web
  namespace: tfm-app
spec:
  podSelector:
    matchLabels:
      app: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Public subnets used by the internet-facing ALB.
        - ipBlock:
            cidr: 10.0.0.0/20
        - ipBlock:
            cidr: 10.0.16.0/20
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alb-and-web-to-api
  namespace: tfm-app
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        # ALB routes /api and performs health checks directly against api.
        - ipBlock:
            cidr: 10.0.0.0/20
        - ipBlock:
            cidr: 10.0.16.0/20
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - podSelector:
            matchLabels:
              app: web
      ports:
        - protocol: TCP
          port: 8000
